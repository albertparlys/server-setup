# ============================================================
#  starship.toml — prompt gaya Powerlevel10k (Catppuccin Mocha).
#  Dipasang oleh module 'zsh' ke ~/.config/starship.remote.toml dan
#  dirujuk lewat $STARSHIP_CONFIG (biar tidak clobber config user).
#
#  BUTUH NERD FONT di terminal supaya ikon/segmen powerline tampil
#  benar (mis. "JetBrainsMono Nerd Font", "MesloLGS NF").
# ============================================================

"$schema" = 'https://starship.rs/config-schema.json'

# Prompt dua baris: baris-1 segmen powerline, baris-2 karakter input.
format = """
[](surface0)\
$os\
$username\
[](bg:blue fg:surface0)\
$directory\
[](fg:blue bg:green)\
$git_branch\
$git_status\
[](fg:green bg:peach)\
$nodejs\
$bun\
$deno\
$python\
$rust\
$golang\
$php\
[](fg:peach bg:mauve)\
$docker_context\
[](fg:mauve bg:surface0)\
$cmd_duration\
[ ](fg:surface0)\
$line_break\
$character"""

add_newline = true
palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext0  = "#a6adc8"
overlay0  = "#6c7086"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

[os]
disabled = false
style = "bg:surface0 fg:text"

[os.symbols]
Ubuntu   = " "
Debian   = " "
Macos    = " "
Linux    = " "
Arch     = " "
Fedora   = " "
Windows  = " "

[username]
show_always = false
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:red"
format = '[ $user ]($style)'

[directory]
style = "bg:blue fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:green fg:crust"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:green fg:crust"
format = '[($all_status$ahead_behind )]($style)'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[nodejs]
symbol = ""
style = "bg:peach fg:crust"
format = '[ $symbol $version ]($style)'

[bun]
symbol = "🥟"
style = "bg:peach fg:crust"
format = '[ $symbol $version ]($style)'

[deno]
symbol = "🦕"
style = "bg:peach fg:crust"
format = '[ $symbol $version ]($style)'

[python]
symbol = ""
style = "bg:peach fg:crust"
format = '[ $symbol $version ]($style)'

[rust]
symbol = ""
style = "bg:peach fg:crust"
format = '[ $symbol $version ]($style)'

[golang]
symbol = ""
style = "bg:peach fg:crust"
format = '[ $symbol $version ]($style)'

[php]
symbol = ""
style = "bg:peach fg:crust"
format = '[ $symbol $version ]($style)'

[docker_context]
symbol = ""
style = "bg:mauve fg:crust"
format = '[ $symbol $context ]($style)'
only_with_files = true

[cmd_duration]
min_time = 500
style = "bg:surface0 fg:yellow"
format = '[  $duration ]($style)'

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"
